<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Body -->
  <ellipse cx="32" cy="44" rx="18" ry="16" fill="#FFD23F"/>
  <!-- Head -->
  <circle cx="32" cy="22" r="14" fill="#FFD23F"/>
