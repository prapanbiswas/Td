  <ellipse cx="32" cy="13" rx="17" ry="4" fill="#E6A800"/>
  <!-- Hard hat top -->
  <rect x="20" y="7" width="24" height="8" rx="4" fill="#FFB800"/>
  <!-- Eye -->
  <circle cx="36" cy="20" r="3.5" fill="#1A1F2E"/>
  <circle cx="37" cy="19" r="1.2" fill="white"/>
  <!-- Beak -->
  <ellipse cx="44" cy="26" rx="7" ry="4" fill="#FF9500" transform="rotate(-5 44 26)"/>
  <!-- Wing -->
  <ellipse cx="17" cy="44" rx="7" ry="11" fill="#E6A800" transform="rotate(-15 17 44)"/>
  <!-- Feet hint -->
  <ellipse cx="26" cy="59" rx="5" ry="3" fill="#FF9500"/>
  <ellipse cx="38" cy="59" rx="5" ry="3" fill="#FF9500"/>
</svg>
